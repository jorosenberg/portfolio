<!DOCTYPE html>

<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="media/quicklog.png">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Schibsted Grotesk"', 'sans-serif'],
                        mono: ['monospace'],
                    },
                    colors: {
                        brand: {
                            blue: '#4c1d95', // Violet 900 base
                            light: '#8b5cf6', // Violet 500
                            secondary: '#FACC15', // Vibrant Sunny Yellow
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                        'fade-out': 'fadeOut 0.5s ease-in forwards',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        fadeOut: {
                            '0%': { opacity: '1', transform: 'translateY(0)' },
                            '100%': { opacity: '0', transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="style.css">
</head>
<body class="font-sans antialiased selection:bg-pink-500 selection:text-white">

            <a href="portfolio.html" class="text-white/80 hover:text-white hover:underline transition-all">Portfolio</a>
            <a href="resume.html" class="text-white/80 hover:text-white hover:underline transition-all">Resume</a>

    </header>
